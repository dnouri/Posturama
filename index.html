<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posturama Launcher</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .launcher {
        background: white;
        padding: 3rem;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
      }
      h1 {
        margin: 0 0 0.5rem 0;
        color: #333;
        font-size: 2rem;
      }
      p {
        margin: 0 0 2rem 0;
        color: #666;
        line-height: 1.5;
      }
      button {
        background: #667eea;
        color: white;
        border: none;
        padding: 1rem 2rem;
        font-size: 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #5a67d8;
      }
      .status {
        margin-top: 1.5rem;
        min-height: 1.5rem;
        color: #4a5568;
      }
    </style>
  </head>
  <body>
    <div class="launcher">
      <h1>Posturama</h1>
      <p>Real-time posture monitoring in a dedicated window</p>
      <button onclick="launch()">Start Monitoring</button>
      <div class="status"></div>
    </div>
    <script>
      let monitor = null

      function launch() {
        const features = 'width=250,height=400,toolbar=no,menubar=no,location=no,status=no'
        monitor = window.open('monitor.html', 'PosturamaMonitor', features)

        if (!monitor || monitor.closed || typeof monitor.closed === 'undefined') {
          showBlockedError()
        } else {
          showStatus('✅ Launching...')
          setTimeout(() => {
            if (monitor && !monitor.closed) {
              window.close()
            }
          }, 2000)
        }
      }

      function showStatus(message) {
        document.querySelector('.status').innerHTML =
          `<div style="color: #4a5568;">${message}</div>`
      }

      function showBlockedError() {
        document.querySelector('.status').innerHTML = `
        <div style="background: #fee; padding: 1rem; border-radius: 8px; margin-top: 1rem; text-align: left;">
          <h3 style="margin: 0 0 0.5rem 0; color: #c53030;">⚠️ Popup Blocked</h3>
          <p style="margin: 0 0 0.5rem 0; color: #742a2a;">Posturama needs a popup window to work.</p>
          <ol style="margin: 0; padding-left: 1.5rem; color: #742a2a;">
            <li>Click the blocked popup icon in your address bar</li>
            <li>Select "Always allow popups from this site"</li>
            <li>Click "Start Monitoring" again</li>
          </ol>
        </div>
      `
      }
    </script>
  </body>
</html>
